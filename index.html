        // ==========================================
        // 1.5. COMPONENTES VISUAIS ADICIONAIS (TREM, BANDEIRAS, SINALIZADORES)
        // ==========================================
        const GOTransitTrain = ({ simSharedRef }) => {
            const trainRef = useRef();
            const state = useRef('hidden'); // 'approaching', 'stopped', 'departing', 'hidden'
            const stopTimer = useRef(0);
            const hiddenTimer = useRef(0);

            useFrame((threeState, delta) => {
                if (!trainRef.current) return;

                const shared = simSharedRef.current;
                const currentInterval = shared.trainFrequencySolution ? 6 : 13; // mais frequente se solução ativa

                if (state.current === 'hidden') {
                    hiddenTimer.current += delta;
                    trainRef.current.position.x = -350;
                    shared.trainPositionX = -350;
                    shared.isTrainStopped = false;
                    if (hiddenTimer.current >= currentInterval) {
                        state.current = 'approaching';
                        hiddenTimer.current = 0;
                    }
                } 
                else if (state.current === 'approaching') {
                    const currentX = trainRef.current.position.x;
                    const targetX = 0;
                    const dist = targetX - currentX;
                    const speed = Math.max(15, dist * 1.5);
                    trainRef.current.position.x += speed * delta * 8;
                    shared.trainPositionX = trainRef.current.position.x;

                    if (trainRef.current.position.x >= -1) {
                        trainRef.current.position.x = 0;
                        shared.trainPositionX = 0;
                        state.current = 'stopped';
                        stopTimer.current = 0;
                        shared.isTrainStopped = true;
                    }
                } 
                else if (state.current === 'stopped') {
                    stopTimer.current += delta;
                    shared.isTrainStopped = true;
                    if (stopTimer.current >= 4.0) { // fica parado 4 segundos
                        state.current = 'departing';
                        shared.isTrainStopped = false;
                        stopTimer.current = 0;
                    }
                } 
                else if (state.current === 'departing') {
                    const currentX = trainRef.current.position.x;
                    const speed = Math.max(25, (currentX + 15) * 1.2);
                    trainRef.current.position.x += speed * delta * 8;
                    shared.trainPositionX = trainRef.current.position.x;

                    if (trainRef.current.position.x > 350) {
                        state.current = 'hidden';
                        hiddenTimer.current = 0;
                    }
                }
            });

            return (
                <group ref={trainRef} position={[-350, 3.5, -205]}>
                    {/* Corpo do trem - GO Transit verde escuro metalizado */}
                    <Box args={[65, 6, 4.5]} castShadow receiveShadow>
                        <meshStandardMaterial color="#166534" metalness={0.7} roughness={0.2} />
                    </Box>
                    {/* Linha branca decorativa */}
                    <Box args={[63, 1.2, 4.7]} position={[0, -1, 0]}>
                        <meshStandardMaterial color="#ffffff" />
                    </Box>
                    {/* Vidro da cabine da frente */}
                    <Box args={[2, 3, 4.6]} position={[31.6, 0.5, 0]}>
                        <meshStandardMaterial color="#1e293b" metalness={0.9} roughness={0.05} />
                    </Box>
                    {/* Vidro da cabine traseira */}

        // ==========================================

        // ==========================================
        // 3. AGENT SIMULATION COMPONENT (INTEGRADO COM LOGÍSTICA & TIME)
        // ==========================================
        const NUM_AGENTS = 5000;
        const AGENT_SPEED = 0.8;
        const tempObject = new THREE.Object3D();
        
        // Cores temáticas das seleções e de status
        const colorWhite = new THREE.Color('#f8fafc'); // Alemanha
        const colorOrange = new THREE.Color('#f97316'); // Costa do Marfim
        const colorRed = new THREE.Color('#ef4444'); // Alerta de congestionamento
        const colorYellow = new THREE.Color('#eab308'); // Alerta de espera
        const colorBlue = new THREE.Color('#8b5cf6'); // Cor da Copa / Fan Zone

        function AgentSimulation({ arrivalRate, departureRate, mitigation, simSharedRef }) {
            const meshRef = useRef();

            const agents = useMemo(() => {
                return new Array(NUM_AGENTS).fill().map((_, i) => ({
                    id: i,
                    position: new THREE.Vector3(0, -100, 0),
                    target: new THREE.Vector3(),
                    state: 'idle',
                    team: Math.random() > 0.5 ? 'GER' : 'CIV',
                    color: new THREE.Color('#000000'),
                    waitTime: 0,
                    isMitigated: false
                }));
            }, []);

            useEffect(() => {
                if (!meshRef.current) return;
                agents.forEach((agent, i) => {
                    meshRef.current.setColorAt(i, agent.color);
                });
                meshRef.current.instanceColor.needsUpdate = true;
            }, [agents]);

            useFrame((state, delta) => {
                if (!meshRef.current) return;
                let needsColorUpdate = false;

                const shared = simSharedRef.current;

                const spawnsPerSecEntry = (arrivalRate / 100) * 20;
                const spawnsThisFrameEntry = spawnsPerSecEntry * delta;
                const countEntry = Math.floor(spawnsThisFrameEntry) + (Math.random() < (spawnsThisFrameEntry % 1) ? 1 : 0);

                const spawnsPerSecExit = (departureRate / 100) * 20;
                const spawnsThisFrameExit = spawnsPerSecExit * delta;
                const countExit = Math.floor(spawnsThisFrameExit) + (Math.random() < (spawnsThisFrameExit % 1) ? 1 : 0);

                const trySpawn = (type) => {
                    const idleAgent = agents.find(a => a.state === 'idle');
                    if (!idleAgent) return;

                    const isGermany = Math.random() > 0.5;
                    idleAgent.team = isGermany ? 'GER' : 'CIV';
                    const baseColor = isGermany ? colorWhite : colorOrange;

                    if (type === 'entry') {
                        idleAgent.position.set((Math.random() - 0.5) * 200, 0.5, SCENERY_BOUNDS.streets.south.z + (Math.random() * 20));
                        idleAgent.target.set(SCENERY_BOUNDS.turnstiles[0].x + (Math.random() - 0.5) * SCENERY_BOUNDS.turnstiles[0].width, 0.5, SCENERY_BOUNDS.turnstiles[0].z + (Math.random() - 0.5) * SCENERY_BOUNDS.turnstiles[0].depth);
                        idleAgent.state = 'moving_to_turnstile';
                        idleAgent.color.copy(baseColor);
                    } else if (type === 'exit') {
                        idleAgent.position.set((Math.random() - 0.5) * SCENERY_BOUNDS.stadium.width, 0.5, (Math.random() - 0.5) * SCENERY_BOUNDS.stadium.depth);
                        idleAgent.isMitigated = (Math.random() * 100) < mitigation;
                        if (idleAgent.isMitigated) {
                            idleAgent.state = 'moving_to_fanzone';
                            const fz = SCENERY_BOUNDS.fanZones[Math.floor(Math.random() * SCENERY_BOUNDS.fanZones.length)];
                            idleAgent.target.set(fz.x + (Math.random() - 0.5) * fz.width, 0.5, fz.z + (Math.random() - 0.5) * fz.depth);
                            idleAgent.color.copy(baseColor);
                        } else {
                            idleAgent.state = 'moving_to_station';
                            idleAgent.target.set(SCENERY_BOUNDS.bridge.x + (Math.random() - 0.5) * SCENERY_BOUNDS.bridge.width, 0.5, SCENERY_BOUNDS.bridge.z + (Math.random() - 0.5) * SCENERY_BOUNDS.bridge.depth);
                            idleAgent.color.copy(baseColor);
                        }
                    }
                    meshRef.current.setColorAt(idleAgent.id, idleAgent.color);
                    needsColorUpdate = true;
                };

                for (let j = 0; j < countEntry; j++) trySpawn('entry');
                for (let j = 0; j < countExit; j++) trySpawn('exit');

                agents.forEach((agent, i) => {
                    if (agent.state === 'idle') {
                        tempObject.position.set(0, -100, 0);
                        tempObject.updateMatrix();
                        meshRef.current.setMatrixAt(i, tempObject.matrix);
                        return;
                    }

                    const dir = new THREE.Vector3().subVectors(agent.target, agent.position);
                    const dist = dir.length();
                    const baseColor = agent.team === 'GER' ? colorWhite : colorOrange;

                    if (dist < 2.5) {
                        if (agent.state === 'moving_to_turnstile') {
                            agent.state = 'waiting_at_turnstile';
                            // Solução ativa: triagem super rápida (0.1s). Senão, lentidão (1.5 a 3.5s).
                            agent.waitTime = shared.extraTurnstilesSolution ? 0.1 : (1.5 + Math.random() * 2.0);
                        } else if (agent.state === 'moving_to_stadium') {
                            agent.state = 'idle';
                        } else if (agent.state === 'moving_to_fanzone') {
                            agent.state = 'waiting_fanzone';
                            agent.waitTime = 3 + Math.random() * 5;
                        } else if (agent.state === 'moving_to_station') {
                            // Ao cruzar a ponte, define o próximo ponto como a estação GO
                            agent.state = 'crossing_bridge';
                            agent.target.set((Math.random() - 0.5) * 35, 0.5, SCENERY_BOUNDS.station.z + (Math.random() - 0.5) * 8);
                        } else if (agent.state === 'crossing_bridge') {
                            agent.state = 'waiting_at_platform';
                            agent.waitTime = 0;
                        }
                    }

                    // Processamento de tempos de espera e estados estáticos
                    if (agent.state === 'waiting_at_turnstile') {
                        agent.waitTime -= delta;
                        if (agent.waitTime > 0.5 && !shared.extraTurnstilesSolution) {
                            // Alerta de catraca travada / congestionamento
                            agent.color.copy(Math.floor(state.clock.elapsedTime * 6) % 2 === 0 ? colorRed : colorYellow);
                            needsColorUpdate = true;
                        } else {
                            agent.color.copy(baseColor);
                            needsColorUpdate = true;
                        }

                        if (agent.waitTime <= 0) {
                            agent.state = 'moving_to_stadium';
                            agent.target.set((Math.random() - 0.5) * SCENERY_BOUNDS.stadium.width, 0.5, (Math.random() - 0.5) * SCENERY_BOUNDS.stadium.depth);
                            agent.color.copy(baseColor);
                            needsColorUpdate = true;
                        }
                    }
                    else if (agent.state === 'waiting_fanzone') {
                        agent.waitTime -= delta;
                        agent.color.copy(colorBlue); // Cor da Fan Zone para integridade visual
                        needsColorUpdate = true;
                        if (agent.waitTime <= 0) {
                            agent.state = 'moving_to_station';
                            agent.target.set(SCENERY_BOUNDS.bridge.x + (Math.random() - 0.5) * SCENERY_BOUNDS.bridge.width, 0.5, SCENERY_BOUNDS.bridge.z + (Math.random() - 0.5) * SCENERY_BOUNDS.bridge.depth);
                            agent.color.copy(baseColor);
                            needsColorUpdate = true;
                        }
                    }
                    else if (agent.state === 'waiting_at_platform') {
                        agent.waitTime += delta;
                        // Se o trem parar na estação, torcedores embarcam e somem!
                        if (shared.isTrainStopped) {
                            agent.state = 'idle';
                            agent.color.copy(new THREE.Color('#000000'));
                            needsColorUpdate = true;
                        } else if (agent.waitTime > 3.0 && !shared.trainFrequencySolution) {
                            // Alerta vermelho piscante de plataforma cheia devido à falta de trens
                            agent.color.copy(Math.floor(state.clock.elapsedTime * 7) % 2 === 0 ? colorRed : colorYellow);
                            needsColorUpdate = true;
                        } else {
                            agent.color.copy(baseColor);
                            needsColorUpdate = true;
                        }
                    }
                    else if (agent.state !== 'idle') {
                        dir.normalize();
                        let speedMultiplier = 1.0;

                        // Se estiver passando pela passarela / ponte GO
                        if (agent.position.z < -50 && agent.position.z > -150) {
                            if (shared.oneWayBridgeSolution) {
                                // Solução ativa (fluxo único): velocidade máxima
                                speedMultiplier = 1.0;
                                agent.color.copy(baseColor);
                            } else {
                                // Risco ativo (engarrafamento): velocidade reduzida para 25% e pisca alerta
                                speedMultiplier = 0.25;
                                agent.color.copy(Math.floor(state.clock.elapsedTime * 4.5) % 2 === 0 ? colorRed : colorYellow);
                            }
                            needsColorUpdate = true;
                        } else if (agent.state === 'moving_to_turnstile' && dist < 30) {
                            // Aproximação de catraca
                            speedMultiplier = 0.55;
                        }
                        
                        agent.position.addScaledVector(dir, AGENT_SPEED * speedMultiplier);
                    }

                    tempObject.position.copy(agent.position);
                    tempObject.updateMatrix();
                    meshRef.current.setMatrixAt(i, tempObject.matrix);
                });

                meshRef.current.instanceMatrix.needsUpdate = true;
                if (needsColorUpdate) {
                    meshRef.current.instanceColor.needsUpdate = true;
                }
            });

            return (
                <instancedMesh ref={meshRef} args={[null, null, NUM_AGENTS]} castShadow receiveShadow>
                    <cylinderGeometry args={[0.4, 0.4, 1.8, 8]} />
                    <meshStandardMaterial />
                </instancedMesh>
            );
        }

        // ==========================================
        // 4. MAIN APP COMPONENT
        // ==========================================
        // ==========================================
        // 4. MAIN APP COMPONENT
        // ==========================================
        function App() {
            const [arrivalRate, setArrivalRate] = useState(30);
            const [departureRate, setDepartureRate] = useState(10);
            const [fanZoneMitigation, setFanZoneMitigation] = useState(20);
            
            // Novos estados para abas e soluções
            const [activeTab, setActiveTab] = useState('jogo');
            const [trainFrequencySolution, setTrainFrequencySolution] = useState(false);
            const [extraTurnstilesSolution, setExtraTurnstilesSolution] = useState(false);
            const [oneWayBridgeSolution, setOneWayBridgeSolution] = useState(false);

            // Referência compartilhada rápida para o loop frame a frame do Three.js (sem render do React)
            const simSharedRef = useRef({
                trainPositionX: -350,
                isTrainStopped: false,
                trainFrequencySolution: false,
                extraTurnstilesSolution: false,
                oneWayBridgeSolution: false
            });

            // Sincroniza estados do React com a referência mutável
            useEffect(() => {
                simSharedRef.current.trainFrequencySolution = trainFrequencySolution;
            }, [trainFrequencySolution]);

            useEffect(() => {
                simSharedRef.current.extraTurnstilesSolution = extraTurnstilesSolution;
            }, [extraTurnstilesSolution]);

            useEffect(() => {
                simSharedRef.current.oneWayBridgeSolution = oneWayBridgeSolution;
            }, [oneWayBridgeSolution]);

            return (
                <div className="w-screen h-screen relative bg-slate-900 text-white overflow-hidden">
                    <Dashboard
                        activeTab={activeTab}
                        setActiveTab={setActiveTab}
                        arrivalRate={arrivalRate}
                        setArrivalRate={setArrivalRate}
                        departureRate={departureRate}
                        setDepartureRate={setDepartureRate}
                        mitigation={fanZoneMitigation}
                        setMitigation={setFanZoneMitigation}
                        trainFrequencySolution={trainFrequencySolution}
                        setTrainFrequencySolution={setTrainFrequencySolution}
                        extraTurnstilesSolution={extraTurnstilesSolution}
                        setExtraTurnstilesSolution={setExtraTurnstilesSolution}
                        oneWayBridgeSolution={oneWayBridgeSolution}
                        setOneWayBridgeSolution={setOneWayBridgeSolution}
                    />
                    <Canvas shadows camera={{ position: [0, 150, 200], fov: 45 }}>
                        <color attach="background" args={['#0c0f17']} />
                        <ambientLight intensity={0.4} />
                        <directionalLight
                            position={[150, 250, 100]} intensity={1.2} castShadow
                            shadow-mapSize-width={2048} shadow-mapSize-height={2048}
                            shadow-camera-far={500} shadow-camera-left={-200}
                            shadow-camera-right={200} shadow-camera-top={200}
                            shadow-camera-bottom={-200} shadow-bias={-0.0001}
                        />
                        <Sky sunPosition={[150, 20, 100]} turbidity={0.3} rayleigh={0.8} />
                        <Environment preset="sunset" />
                        <BakeShadows />
                        <Scenery 
                            simSharedRef={simSharedRef}
                            trainFrequencySolution={trainFrequencySolution}
                            extraTurnstilesSolution={extraTurnstilesSolution}
                            oneWayBridgeSolution={oneWayBridgeSolution}
                        />
                        <AgentSimulation 
                            arrivalRate={arrivalRate} 
                            departureRate={departureRate} 
                            mitigation={fanZoneMitigation} 
                            simSharedRef={simSharedRef}
                        />
                        <OrbitControls enablePan={true} enableZoom={true} enableRotate={true} maxPolarAngle={Math.PI / 2 - 0.05} />
                    </Canvas>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
